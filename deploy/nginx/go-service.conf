# Nginx 反向代理配置模板 —— tankService
#
# 用法（在服务器上，见 docs/DEPLOY.md）：
#   1. 把本文件复制或软链到 /etc/nginx/conf.d/go-service.conf
#   2. server_name 已设为 tank.dayangge.site（如换域名，改此处）
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d tank.dayangge.site  # 自动补 443 + HTTP 跳转 HTTPS
#
# 说明：应用容器只绑定 127.0.0.1:3000，不对外网暴露；
#       外部仅通过本反代经 80/443 访问。

server {
    listen 80;
    listen [::]:80;
    server_name tank.dayangge.site;

    # 单次上传体积上限（如有图片/文件上传接口，按需调大）
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（消息服务 /api/v1 下的 ws 连接需要）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket 长连接超时，避免代理层过早断开
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# 执行 certbot --nginx 后，上方 server 会被自动改写为 443/SSL，
# 并新增一个 80 → 443 的跳转 server。无需手动编辑。

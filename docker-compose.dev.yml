version: '3.8'

services:
  # MySQL Database for development
  mysql:
    image: mysql:8.0
    container_name: go-service-mysql-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-go_service_db}
    ports:
      - '${DB_PORT:-3307}:3306'
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - go-service-dev-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

volumes:
  mysql_dev_data:
    driver: local

networks:
  go-service-dev-network:
    driver: bridge
